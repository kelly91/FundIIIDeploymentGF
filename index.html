<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fund III Portfolio Construction — Good Friends VC</title>
  <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: #FFF5E6; font-family: Georgia, serif; color: #031738; min-height: 100vh; }
    input[type=range] { accent-color: #031738; width: 100%; cursor: pointer; }
    select { -webkit-appearance: none; appearance: none; cursor: pointer; }
    ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: #EAD9C0; } ::-webkit-scrollbar-thumb { background: #031738; border-radius: 3px; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
    @keyframes shake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-8px)} 40%,80%{transform:translateX(8px)} }
    @keyframes fadeIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }
    #gate { position:fixed; inset:0; background:#031738; display:flex; align-items:center; justify-content:center; z-index:9999; }
    #gate.hidden { display:none; }
    #gate-box { text-align:center; max-width:360px; width:100%; padding:0 24px; }
    #gate-box h2 { font-family:Georgia,serif; color:#FFF5E6; font-size:22px; font-weight:600; margin-bottom:6px; }
    #gate-box p { font-family:Arial,sans-serif; color:rgba(255,245,230,0.45); font-size:12px; margin-bottom:32px; letter-spacing:0.06em; }
    #gate-input { width:100%; padding:14px 18px; font-size:18px; font-family:Georgia,serif; text-align:center; letter-spacing:0.12em; background:rgba(255,245,230,0.08); border:1px solid rgba(255,245,230,0.2); border-radius:10px; color:#FFF5E6; outline:none; caret-color:#B08D57; transition:border 0.2s; }
    #gate-input:focus { border-color:rgba(176,141,87,0.6); }
    #gate-input.error { animation:shake 0.4s ease; border-color:rgba(220,80,80,0.6); }
    #gate-btn { margin-top:14px; width:100%; padding:13px; font-family:Arial,sans-serif; font-size:13px; font-weight:600; letter-spacing:0.08em; background:#B08D57; color:#031738; border:none; border-radius:10px; cursor:pointer; }
    #gate-error { margin-top:12px; font-family:Arial,sans-serif; font-size:12px; color:rgba(220,80,80,0.8); min-height:18px; }
    #gate-logo { font-family:Arial,sans-serif; font-size:10px; letter-spacing:0.16em; color:rgba(255,245,230,0.3); margin-bottom:28px; }
  </style>
</head>
<body>
  <div id="gate">
    <div id="gate-box">
      <div id="gate-logo">GOOD FRIENDS VENTURE CAPITAL</div>
      <h2>Fund III Model</h2>
      <p>CONFIDENTIAL · GP USE ONLY</p>
      <input id="gate-input" type="password" placeholder="Enter password" autocomplete="off" onkeydown="if(event.key==='Enter')checkPw()" />
      <button id="gate-btn" onclick="checkPw()">ENTER →</button>
      <div id="gate-error"></div>
    </div>
  </div>
  <script>
    function checkPw() {
      var val = document.getElementById('gate-input').value;
      if (val === 'GF26') { document.getElementById('gate').classList.add('hidden'); }
      else {
        var inp = document.getElementById('gate-input');
        inp.classList.remove('error'); void inp.offsetWidth; inp.classList.add('error');
        document.getElementById('gate-error').textContent = 'Incorrect password.';
        inp.value = ''; inp.focus();
      }
    }
  </script>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useMemo, useEffect } = React;
    const STORAGE_KEY = "gf-fund3-state-v1";
    const encodeState = (s) => {
      try { return btoa(encodeURIComponent(JSON.stringify(s))); } catch { return ""; }
    };
    const decodeState = (h) => {
      try { return JSON.parse(decodeURIComponent(atob(h))); } catch { return null; }
    };
    const loadInitial = () => {
      const hash = window.location.hash.replace(/^#/, "");
      if (hash) {
        const fromHash = decodeState(hash);
        if (fromHash) return fromHash;
      }
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) return JSON.parse(raw);
      } catch {}
      return null;
    };
    const INITIAL = loadInitial();
    const NAVY="#031738", CREAM="#FFF5E6", CREAM_DARK="#EAD9C0", GOLD="#B08D57";
    const BLUE2="#4A6FA5", BLUE3="#9DB5C7", GREEN="#2E7D32", GREEN_BG="#E8F5E9", PURPLE="#7B5EA7";

    // ==========================================================================
    // SOURCE OF TRUTH — pulled from Airtable Entity Snapshots, post-SlapSnacks
    // Airtable base: appirbXgN1LWHPhZA · table: tbl0fdJuxUvky5laM
    // Fund III record: recYXDteZSdc2SiDq · Affiliates III record: reckdKzjyDME3WU5x
    //
    // To refresh: pull Fund III + Aff III Usable Dry Powder (Waive) from Airtable,
    // sum to get pre-SlapSnacks family DP, subtract $200K SlapSnacks soft commit,
    // update the four constants below + LAST_SYNCED.
    // ==========================================================================
    const LAST_SYNCED      = "April 30, 2026";
    const FAMILY_DP_PRE    = 6447879;            // Fund III $6,341,155 + Aff III $106,725 from Airtable Waive Usable DP
    const SLAPSNACKS       = 200000;             // soft commit, manually held in calculator (not in Airtable)
    const FAMILY_DP        = FAMILY_DP_PRE - SLAPSNACKS;          // $6,247,879
    const AFF_III_RATIO    = 0.016552;           // 335,010 / 20,240,000 (Aff III commit / family commit)
    const FUND_III_RATIO   = 0.983448;           // 19,904,990 / 20,240,000 (Fund III commit / family commit)
    const AFF_III_DP       = Math.round(FAMILY_DP * AFF_III_RATIO);   // $103,414
    const FUND_III_DEPLOY  = Math.round(FAMILY_DP * FUND_III_RATIO);  // $6,144,465
    const BASE_DP          = FUND_III_DEPLOY;    // legacy alias, still references Fund III deployable

    const TIER_COLORS = { null:"#C8C0B4", 1:NAVY, 2:BLUE2, 3:BLUE3 };
    const TIER_LABELS = { null:"— Assign Tier —", 1:"Tier 1 — Double Down", 2:"Tier 2 — Stay In", 3:"Tier 3 — Let It Ride" };
    const COMPANIES = [
      { name:"Biologica",         sector:"Consumer",    cost:165000,  fmv:165000,  moic:1.00, entryVal:22.5, latestVal:38,   own:0.0073,  stage:"Pre-Seed", signal:"Green",  note:null, wired:false, costBreakdown:null },
      { name:"Bodhium Labs",      sector:"Ent. SaaS",   cost:300000,  fmv:300000,  moic:1.00, entryVal:20,   latestVal:null, own:0.015,   stage:"Pre-Seed", signal:"Green",  note:null, wired:false, costBreakdown:null },
      { name:"Climatic",          sector:"Healthcare",  cost:1000001, fmv:1000000, moic:1.00, entryVal:18,   latestVal:null, own:0.1111,  stage:"Seed",     signal:"Yellow", note:null, wired:false, costBreakdown:null },
      { name:"Crosby",            sector:"Ent. SaaS",   cost:150002,  fmv:330998,  moic:2.21, entryVal:120,  latestVal:60,   own:0.00375, stage:"Series A", signal:"Yellow", note:null, wired:false, costBreakdown:null },
      { name:"Drivepoint",        sector:"Fintech",     cost:498599,  fmv:498599,  moic:1.00, entryVal:24,   latestVal:null, own:0.0208,  stage:"Series A", signal:"Yellow", note:null, wired:false, costBreakdown:null },
      { name:"Emanate",           sector:"Ent. SaaS",   cost:500000,  fmv:500000,  moic:1.00, entryVal:40,   latestVal:null, own:0.0125,  stage:"Seed",     signal:"Green",  note:null, wired:false, costBreakdown:null },
      { name:"Kinetic Apps",      sector:"Dev Tools",   cost:250000,  fmv:250000,  moic:1.00, entryVal:95,   latestVal:null, own:0.00526, stage:"Series A", signal:"Green",  note:null, wired:false, costBreakdown:null },
      { name:"Metabologic AI",    sector:"Healthcare",  cost:300000,  fmv:300000,  moic:1.00, entryVal:20,   latestVal:null, own:0.015,   stage:"Pre-Seed", signal:"Green",  note:null, wired:false, costBreakdown:null },
      { name:"Mosaic Platforms",  sector:"Fintech",     cost:1140000, fmv:1140000, moic:1.00, entryVal:43,   latestVal:72.5, own:0.0091,  stage:"Pre-Seed", signal:"Green",  note:null, wired:true,  costBreakdown:"$390K initial + $750K FO" },
      { name:"Pioneer Pastures",  sector:"Food & Bev",  cost:250000,  fmv:250000,  moic:1.00, entryVal:35,   latestVal:null, own:0.0143,  stage:"Seed",     signal:"Green",  note:null, wired:false, costBreakdown:null },
      { name:"PreemptiveAI",      sector:"Healthcare",  cost:750000,  fmv:750000,  moic:1.00, entryVal:22,   latestVal:null, own:0.0682,  stage:"Seed",     signal:"Green",  note:null, wired:false, costBreakdown:null },
      { name:"Seneca",            sector:"Hardware",    cost:219989,  fmv:346089,  moic:1.57, entryVal:115,  latestVal:220,  own:0.00348, stage:"Series A", signal:"Green",  note:null, wired:true,  costBreakdown:"$200K initial + $20K FO" },
      { name:"Stiller's Soda",    sector:"Food & Bev",  cost:50000,   fmv:80769,   moic:1.62, entryVal:13,   latestVal:28,   own:null,    stage:"Seed",     signal:"Yellow", note:null, wired:false, costBreakdown:null },
      { name:"Ultra",             sector:"Consumer",    cost:500001,  fmv:499995,  moic:1.00, entryVal:75,   latestVal:null, own:0.00667, stage:"Series A", signal:"Yellow", note:null, wired:false, costBreakdown:null },
    ];
    const f$ = n => (!n&&n!==0)?"—":n>=1e6?`$${(n/1e6).toFixed(2)}M`:`$${Math.round(n/1000)}K`;
    const fP = n => !n?"—":`${(n*100).toFixed(2)}%`;
    const fX = n => !n?"—":`${n.toFixed(2)}x`;
    const fV = n => (!n&&n!==0)?"—":`$${n}M`;
    const ASSIGNABLE = COMPANIES.filter(c => !c.wired);
    function App() {
      const [remaining, setRemaining] = useState(INITIAL?.remaining ?? BASE_DP / 1e6);
      const [avgCheck, setAvgCheck]   = useState(INITIAL?.avgCheck ?? 350);
      const [showSim, setShowSim]     = useState(true);
      const [showConstraint, setShowConstraint] = useState(false);
      const [pipeline, setPipeline]   = useState(INITIAL?.pipeline ?? []);
      const [newName, setNewName]     = useState('');
      const [newCheckK, setNewCheckK] = useState(350);
      const [dealPerMonth, setDealPerMonth] = useState(INITIAL?.dealPerMonth ?? 1);
      const [asgn, setAsgn] = useState(() => {
        const base = {};
        COMPANIES.forEach(c => { base[c.name] = { tier:null, followOn:250 }; });
        if (INITIAL?.asgn) {
          COMPANIES.forEach(c => { if (INITIAL.asgn[c.name]) base[c.name] = INITIAL.asgn[c.name]; });
        }
        return base;
      });
      const [copied, setCopied] = useState(false);
      useEffect(() => {
        const state = { remaining, avgCheck, pipeline, dealPerMonth, asgn };
        const encoded = encodeState(state);
        if (encoded) window.history.replaceState(null, "", "#" + encoded);
        try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch {}
      }, [remaining, avgCheck, pipeline, dealPerMonth, asgn]);
      const copyShareLink = () => {
        navigator.clipboard.writeText(window.location.href).then(() => {
          setCopied(true);
          setTimeout(() => setCopied(false), 2000);
        });
      };
      const setTier = (name, val) => setAsgn(a => ({...a,[name]:{...a[name],tier:val==="null"?null:Number(val)}}));
      const setFO   = (name, val) => setAsgn(a => ({...a,[name]:{...a[name],followOn:val}}));
      const resetAll = () => {
        setAsgn(a => { const n={...a}; ASSIGNABLE.forEach(c=>{n[c.name]={tier:null,followOn:250}}); return n; });
        setPipeline([]);
        try { localStorage.removeItem(STORAGE_KEY); } catch {}
        window.history.replaceState(null, "", window.location.pathname + window.location.search);
      };
      const assignedCount = ASSIGNABLE.filter(c => asgn[c.name].tier !== null).length;
      const allAssigned   = assignedCount === ASSIGNABLE.length;
      const {t1,t2,foTotal} = useMemo(() => {
        let t1=0,t2=0;
        ASSIGNABLE.forEach(c => {
          const a = asgn[c.name];
          if(a.tier===1) t1+=a.followOn;
          if(a.tier===2) t2+=a.followOn;
        });
        return {t1:t1/1000,t2:t2/1000,foTotal:(t1+t2)/1000};
      },[asgn]);
      const pipelineM    = pipeline.reduce((s,d)=>s+d.checkK/1000,0);
      const afterFO      = Math.max(0, remaining - foTotal);
      const afterPipeline= Math.max(0, afterFO - pipelineM);
      const maxNewDeals  = avgCheck>0 ? Math.floor(afterPipeline/(avgCheck/1000)) : 0;
      const overBudget   = (foTotal + pipelineM) > remaining;
      const deployed = COMPANIES.reduce((s,c)=>s+c.cost,0);
      const pctDep   = Math.round((deployed/1e6/20.24)*100);
      const t1cos    = ASSIGNABLE.filter(c=>asgn[c.name].tier===1).length;
      const t2cos    = ASSIGNABLE.filter(c=>asgn[c.name].tier===2).length;
      const remainingColor = afterPipeline<0.5?"#DC3545":afterPipeline<1.5?"#E67E22":GREEN;
      const foPct   = remaining>0 ? Math.round((foTotal/remaining)*100) : 0;
      const newPct  = 100 - foPct;
      const foDeals = Math.floor(foTotal/0.385);
      const newPoolM = Math.max(0, remaining - foTotal);
      const addDeal = () => {
        if(!newName.trim()||newCheckK<=0) return;
        setPipeline(p=>[...p,{id:Date.now(),name:newName.trim(),checkK:newCheckK}]);
        setNewName(''); setNewCheckK(350);
      };
      const totalNew = pipeline.length + maxNewDeals;
      const monthsLeft = dealPerMonth>0 ? Math.ceil(totalNew/dealPerMonth) : 99;
      const deployDate = new Date(2026,3,30);
      deployDate.setMonth(deployDate.getMonth()+monthsLeft);
      const deployStr = deployDate.toLocaleDateString('en-US',{month:'long',year:'numeric'});
      const foW  = Math.min(100,(foTotal/remaining)*100);
      const pipW = Math.min(100-foW,(pipelineM/remaining)*100);
      const card = (bg,border) => ({background:bg||"white",borderRadius:10,padding:"14px 16px",border:border||`1px solid ${CREAM_DARK}`});
      return (
        <div style={{background:CREAM,minHeight:"100vh",padding:"28px 24px",fontFamily:"Georgia,serif",color:NAVY}}>
        <div style={{maxWidth:1160,margin:"0 auto"}}>
          {/* Header */}
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",marginBottom:14}}>
            <div>
              <div style={{fontSize:10,letterSpacing:"0.14em",opacity:0.4,fontFamily:"Arial,sans-serif",marginBottom:4}}>GOOD FRIENDS VENTURE CAPITAL</div>
              <h1 style={{fontSize:22,fontWeight:600,margin:0}}>Fund III: Tiered Conviction Model</h1>
              <p style={{fontSize:12,opacity:0.5,fontStyle:"italic",margin:"4px 0 0"}}>Assign tiers. Watch the math update in real time.</p>
            </div>
            <div style={{display:"flex",gap:10,alignItems:"center"}}>
              <button onClick={copyShareLink} style={{background:copied?GREEN_BG:"white",border:`1px solid ${copied?GREEN:CREAM_DARK}`,borderRadius:20,padding:"6px 14px",fontSize:11,color:copied?GREEN:NAVY,fontFamily:"Arial,sans-serif",cursor:"pointer",fontWeight:600,letterSpacing:"0.04em"}}>
                {copied ? "✓ Link copied" : "Copy shareable link"}
              </button>
              <div style={{background:allAssigned?GREEN_BG:NAVY,borderRadius:20,padding:"7px 16px",display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontSize:13,fontWeight:700,color:allAssigned?GREEN:"white"}}>{assignedCount} / {ASSIGNABLE.length} assigned</span>
                {!allAssigned && <span style={{fontSize:11,color:"rgba(255,255,255,0.55)",animation:"pulse 2s infinite"}}>● live</span>}
                {allAssigned && <span style={{fontSize:13,color:GREEN}}>✓</span>}
              </div>
              <button onClick={resetAll} style={{fontSize:11,fontFamily:"Arial,sans-serif",background:"white",border:`1px solid ${CREAM_DARK}`,borderRadius:8,padding:"7px 14px",cursor:"pointer",color:NAVY,opacity:0.7}}>Reset all</button>
            </div>
          </div>
          {/* Constraint banner */}
          <div onClick={()=>setShowConstraint(s=>!s)}
            style={{background:NAVY,borderRadius:10,padding:"12px 18px",marginBottom:14,cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div style={{display:"flex",alignItems:"center",gap:16}}>
              <div style={{width:3,height:28,background:GOLD,borderRadius:2,flexShrink:0}}/>
              <div>
                <div style={{fontSize:10,color:"rgba(255,245,230,0.5)",letterSpacing:"0.1em",fontFamily:"Arial,sans-serif",marginBottom:3}}>AFFILIATES III CO-INVEST CONSTRAINT</div>
                <div style={{display:"flex",gap:24,alignItems:"baseline",flexWrap:"wrap"}}>
                  <span style={{fontSize:13,color:"white",fontFamily:"Arial,sans-serif"}}>Aff III DP: <strong>${(AFF_III_DP/1000).toFixed(1)}K</strong></span>
                  <span style={{fontSize:13,color:"rgba(255,245,230,0.5)",fontFamily:"Arial,sans-serif"}}>÷ {(AFF_III_RATIO*100).toFixed(4)}%</span>
                  <span style={{fontSize:13,color:"white",fontFamily:"Arial,sans-serif"}}>Family total: <strong>${(FAMILY_DP/1e6).toFixed(2)}M</strong></span>
                  <span style={{fontSize:15,color:GOLD,fontWeight:700}}>Fund III: ${(FUND_III_DEPLOY/1e6).toFixed(2)}M · Aff III: ${(AFF_III_DP/1000).toFixed(1)}K</span>
                  <span style={{fontSize:11,color:"rgba(255,245,230,0.45)",fontFamily:"Arial,sans-serif"}}>SlapSnacks $200K already deducted · Synced {LAST_SYNCED}</span>
                </div>
              </div>
            </div>
            <span style={{fontSize:12,color:"rgba(255,245,230,0.4)",transform:showConstraint?"rotate(180deg)":"none",transition:"transform 0.2s",display:"inline-block"}}>▼</span>
          </div>
          {showConstraint && (
            <div style={{background:"white",borderRadius:10,border:`1px solid ${CREAM_DARK}`,padding:"14px 18px",marginBottom:14,animation:"fadeIn 0.2s ease"}}>
              <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12}}>
                {[
                  {label:"FAMILY TOTAL DP",       val:`$${FAMILY_DP.toLocaleString()}`,      sub:"Post-SlapSnacks · Aduro fees · Airtable Waive"},
                  {label:"AFFILIATES III DP",     val:`$${AFF_III_DP.toLocaleString()}`,     sub:`Binding constraint at ${(AFF_III_RATIO*100).toFixed(4)}%`},
                  {label:"FUND III DEPLOYABLE",   val:`$${FUND_III_DEPLOY.toLocaleString()}`,sub:`${(FUND_III_RATIO*100).toFixed(4)}% of family total`},
                  {label:"SLAP SNACKS",           val:"$200K in base",                       sub:"Soft commit already deducted"},
                ].map(({label,val,sub})=>(
                  <div key={label} style={{padding:"10px 14px",background:"#FAFAF8",borderRadius:8,border:`1px solid ${CREAM_DARK}`}}>
                    <div style={{fontSize:9,letterSpacing:"0.1em",opacity:0.4,fontFamily:"Arial,sans-serif",marginBottom:6}}>{label}</div>
                    <div style={{fontSize:18,fontWeight:700}}>{val}</div>
                    {sub && <div style={{fontSize:10,opacity:0.5,marginTop:4,fontFamily:"Arial,sans-serif"}}>{sub}</div>}
                  </div>
                ))}
              </div>
              <div style={{marginTop:10,fontSize:11,fontFamily:"Arial,sans-serif",color:NAVY,opacity:0.5}}>
                Fund III commit $19,904,990 · Aff III commit $335,010 · Family $20,240,000. Outstanding calls included: Dave + Jeff last 15% GP call, Neil GP contribution pending transfer, Adam Templeton Aff III Call 3 ($15K). Fees and remaining expenses sourced from Aduro.
              </div>
            </div>
          )}
          {/* Summary bar */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:10,marginBottom:16}}>
            {[
              {label:"FUND III SIZE",          val:"$20.24M",                     edit:false},
              {label:"DEPLOYED (incl. FOs)",   val:f$(deployed),                  edit:false, bar:true},
              {label:"USABLE DP (EDITABLE)",   val:null,                          edit:true},
              {label:"FOLLOW-ON RESERVED",     val:allAssigned?`$${foTotal.toFixed(2)}M`:"—", edit:false},
              {label:"AVAILABLE — NEW DEALS",  val:`$${afterPipeline.toFixed(2)}M`, edit:false, highlight:true},
            ].map(({label,val,edit,bar,highlight})=>(
              <div key={label} style={card(highlight?"#F0F7FF":undefined,highlight?`2px solid ${BLUE2}`:undefined)}>
                <div style={{fontSize:9,letterSpacing:"0.1em",opacity:0.4,fontFamily:"Arial,sans-serif",marginBottom:7}}>{label}</div>
                {edit ? (
                  <div>
                    <div style={{display:"flex",alignItems:"baseline",gap:2}}>
                      <span style={{fontSize:13,opacity:0.4}}>$</span>
                      <input type="number" value={remaining} min={0} max={10} step={0.01}
                        onChange={e=>setRemaining(Number(e.target.value))}
                        style={{fontSize:20,fontWeight:700,color:NAVY,border:"none",background:"transparent",width:65,outline:"none"}}/>
                      <span style={{fontSize:13,opacity:0.4}}>M</span>
                    </div>
                    <div style={{fontSize:9,opacity:0.35,marginTop:3,fontFamily:"Arial,sans-serif"}}>SlapSnacks already in this figure</div>
                  </div>
                ) : (
                  <div style={{fontSize:20,fontWeight:700,color:highlight?remainingColor:(val==="—"?"#C8C0B4":NAVY)}}>{val}</div>
                )}
                {bar && (
                  <div style={{marginTop:8}}>
                    <div style={{height:4,borderRadius:2,background:CREAM_DARK,overflow:"hidden"}}>
                      <div style={{height:"100%",width:`${pctDep}%`,background:NAVY,borderRadius:2}}/>
                    </div>
                    <div style={{fontSize:9,opacity:0.4,marginTop:3,fontFamily:"Arial,sans-serif"}}>{pctDep}% of fund deployed</div>
                  </div>
                )}
              </div>
            ))}
          </div>
          {/* Current Split */}
          <div style={{background:"white",borderRadius:10,border:`1px solid ${CREAM_DARK}`,padding:"14px 18px",marginBottom:14}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
              <div style={{fontSize:9,letterSpacing:"0.1em",opacity:0.4,fontFamily:"Arial,sans-serif",textTransform:"uppercase"}}>Current Split</div>
              <div style={{fontSize:14,fontWeight:700,color:NAVY,fontFamily:"Georgia,serif"}}>{foPct} / {newPct}</div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20,marginBottom:12}}>
              <div>
                <div style={{fontSize:9,letterSpacing:"0.1em",opacity:0.45,fontFamily:"Arial,sans-serif",textTransform:"uppercase",marginBottom:5}}>Follow-On Pool</div>
                <div style={{fontSize:17,fontWeight:700,color:BLUE2,fontFamily:"Georgia,serif"}}>${foTotal.toFixed(2)}M <span style={{fontSize:12,opacity:0.55,fontWeight:400}}>— {foPct}%</span></div>
                <div style={{fontSize:10,opacity:0.55,fontFamily:"Arial,sans-serif",marginTop:4}}>~{foDeals} follow-on{foDeals===1?"":"s"} at $385K avg</div>
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{fontSize:9,letterSpacing:"0.1em",opacity:0.45,fontFamily:"Arial,sans-serif",textTransform:"uppercase",marginBottom:5}}>New Deals Pool</div>
                <div style={{fontSize:17,fontWeight:700,color:NAVY,fontFamily:"Georgia,serif"}}>${newPoolM.toFixed(2)}M <span style={{fontSize:12,opacity:0.55,fontWeight:400}}>— {newPct}%</span></div>
                <div style={{fontSize:10,opacity:0.55,fontFamily:"Arial,sans-serif",marginTop:4}}>~{maxNewDeals} new deal{maxNewDeals===1?"":"s"} at ${avgCheck}K</div>
              </div>
            </div>
            <div style={{height:12,borderRadius:6,background:CREAM_DARK,overflow:"hidden",display:"flex"}}>
              <div style={{height:"100%",width:`${foPct}%`,background:BLUE2,transition:"width 0.3s ease"}} title={`Follow-On ${foPct}%`}/>
              <div style={{height:"100%",width:`${newPct}%`,background:NAVY,transition:"width 0.3s ease"}} title={`New Deals ${newPct}%`}/>
            </div>
          </div>
          {/* Tier legend */}
          <div style={{display:"flex",gap:8,marginBottom:14,alignItems:"center"}}>
            <span style={{fontSize:11,opacity:0.45,fontFamily:"Arial,sans-serif",marginRight:4}}>Tiers:</span>
            {[1,2,3].map(t=>(
              <div key={t} style={{display:"flex",alignItems:"center",gap:6,padding:"5px 14px",borderRadius:20,background:TIER_COLORS[t]}}>
                <span style={{fontSize:11,color:"white",fontFamily:"Arial,sans-serif"}}>{TIER_LABELS[t]}</span>
              </div>
            ))}
          </div>
          {/* Company table */}
          <div style={{background:"white",borderRadius:12,border:`1px solid ${CREAM_DARK}`,overflow:"hidden",marginBottom:14}}>
            <div style={{display:"grid",gridTemplateColumns:"1.6fr 0.65fr 0.6fr 0.7fr 0.7fr 0.75fr 0.6fr 0.45fr 1.5fr 1fr",gap:8,padding:"10px 18px",background:NAVY}}>
              {["Company","Sector","Stage","Cost","FMV","Entry → Latest","Own %","MOIC","Tier","Follow-On ($K)"].map(h=>(
                <div key={h} style={{fontSize:9,color:"rgba(255,255,255,0.5)",fontFamily:"Arial,sans-serif",letterSpacing:"0.07em"}}>{h}</div>
              ))}
            </div>
            {COMPANIES.map((c,i)=>{
              const a = asgn[c.name];
              const isLast = i===COMPANIES.length-1;
              return (
                <div key={c.name} style={{display:"grid",gridTemplateColumns:"1.6fr 0.65fr 0.6fr 0.7fr 0.7fr 0.75fr 0.6fr 0.45fr 1.5fr 1fr",gap:8,padding:"12px 18px",background:i%2===0?"white":"#FDFAF5",borderBottom:isLast?"none":`1px solid ${CREAM_DARK}`,alignItems:"center",opacity:c.wired?0.78:1}}>
                  <div>
                    <div style={{fontWeight:600,fontSize:13}}>{c.name}</div>
                    {c.note && <div style={{fontSize:9,color:c.wired?"#2E7D32":"#aaa",fontStyle:"italic",marginTop:2}}>{c.note}</div>}
                  </div>
                  <div style={{fontSize:11,opacity:0.6}}>{c.sector}</div>
                  <div style={{fontSize:11,opacity:0.6}}>{c.stage}</div>
                  <div>
                    <div style={{fontSize:12,fontWeight:500}}>{f$(c.cost)}</div>
                    {c.costBreakdown && <div style={{fontSize:9,opacity:0.5,marginTop:2,fontFamily:"Arial,sans-serif"}}>{c.costBreakdown}</div>}
                  </div>
                  <div style={{fontSize:12}}>{f$(c.fmv)}</div>
                  <div style={{fontSize:11}}>{fV(c.entryVal)}{c.latestVal?<span style={{opacity:0.45}}> → {fV(c.latestVal)}</span>:""}</div>
                  <div style={{fontSize:11}}>{fP(c.own)}</div>
                  <div style={{fontSize:12,fontWeight:c.moic>1.2?600:400,color:c.moic>=1.5?GREEN:NAVY}}>{fX(c.moic)}</div>
                  {c.wired ? (
                    <div style={{fontSize:11,color:GREEN,fontWeight:600,fontStyle:"italic",padding:"5px 0"}}>Wired ✓</div>
                  ) : (
                    <select value={a.tier===null?"null":a.tier} onChange={e=>setTier(c.name,e.target.value)}
                      style={{fontSize:11,color:"white",background:TIER_COLORS[a.tier],border:"none",borderRadius:6,padding:"5px 10px",width:"100%",fontFamily:"Arial,sans-serif",fontWeight:600,outline:"none",transition:"background 0.2s"}}>
                      <option value="null" style={{background:"#888"}}>— Assign Tier —</option>
                      <option value="1" style={{background:NAVY}}>Tier 1 — Double Down</option>
                      <option value="2" style={{background:BLUE2}}>Tier 2 — Stay In</option>
                      <option value="3" style={{background:BLUE3}}>Tier 3 — Let It Ride</option>
                    </select>
                  )}
                  <div>
                    {c.wired ? <div style={{fontSize:11,color:GREEN,fontStyle:"italic"}}>wired</div>
                    : a.tier===null ? <div style={{fontSize:11,color:"#D0C8C0",fontStyle:"italic"}}>—</div>
                    : a.tier===3 ? <div style={{fontSize:11,color:"#C0B8B0",fontStyle:"italic"}}>$0</div>
                    : (
                      <div style={{display:"flex",alignItems:"center",gap:3}}>
                        <span style={{fontSize:11,opacity:0.35}}>$</span>
                        <input type="number" value={a.followOn} min={0} max={2000} step={50}
                          onChange={e=>setFO(c.name,Number(e.target.value))}
                          style={{width:60,fontSize:13,fontWeight:600,color:NAVY,border:`1px solid ${CREAM_DARK}`,borderRadius:5,padding:"4px 6px",textAlign:"center",outline:"none",background:"white"}}/>
                        <span style={{fontSize:11,opacity:0.35}}>K</span>
                      </div>
                    )}
                  </div>
                </div>
              );
            })}
          </div>
          {/* Summary tiles */}
          <div style={{display:"grid",gridTemplateColumns:"1.2fr 1fr 1fr 1fr",gap:12,marginBottom:14}}>
            <div style={card()}>
              <div style={{fontSize:9,letterSpacing:"0.1em",opacity:0.4,fontFamily:"Arial,sans-serif",marginBottom:8}}>AVG NEW DEAL CHECK</div>
              <div style={{display:"flex",alignItems:"baseline",gap:3,marginBottom:8}}>
                <span style={{fontSize:13,opacity:0.4}}>$</span>
                <input type="number" value={avgCheck} min={100} max={1000} step={25}
                  onChange={e=>setAvgCheck(Number(e.target.value))}
                  style={{fontSize:20,fontWeight:700,color:NAVY,border:"none",background:"transparent",width:65,outline:"none"}}/>
                <span style={{fontSize:13,opacity:0.4}}>K</span>
              </div>
              <input type="range" min={100} max={1000} step={25} value={avgCheck} onChange={e=>setAvgCheck(Number(e.target.value))}/>
              <div style={{fontSize:9,opacity:0.35,marginTop:5,fontFamily:"Arial,sans-serif"}}>Fund III range $50K–$1M · $343K avg to date</div>
            </div>
            <div style={{...card(NAVY),color:"white"}}>
              <div style={{fontSize:9,opacity:0.45,letterSpacing:"0.1em",fontFamily:"Arial,sans-serif",marginBottom:8}}>TIER 1 RESERVED</div>
              <div style={{fontSize:22,fontWeight:700,marginBottom:4,color:allAssigned?"white":"rgba(255,255,255,0.4)"}}>
                {allAssigned?`$${t1.toFixed(2)}M`:"—"}
              </div>
              <div style={{fontSize:10,opacity:0.4}}>{t1cos} compan{t1cos===1?"y":"ies"} · excl. wired FOs</div>
            </div>
            <div style={{...card(BLUE2),color:"white"}}>
              <div style={{fontSize:9,opacity:0.55,letterSpacing:"0.1em",fontFamily:"Arial,sans-serif",marginBottom:8}}>TIER 2 RESERVED</div>
              <div style={{fontSize:22,fontWeight:700,marginBottom:4,color:allAssigned?"white":"rgba(255,255,255,0.4)"}}>
                {allAssigned?`$${t2.toFixed(2)}M`:"—"}
              </div>
              <div style={{fontSize:10,opacity:0.5}}>{t2cos} companies participating</div>
            </div>
            <div style={{...card("white",allAssigned?`2px solid ${NAVY}`:`1px solid ${CREAM_DARK}`)}}>
              <div style={{fontSize:9,letterSpacing:"0.1em",opacity:0.4,fontFamily:"Arial,sans-serif",marginBottom:8}}>MAX NEW POSITIONS</div>
              <div style={{fontSize:22,fontWeight:700,marginBottom:4,color:allAssigned?NAVY:"#C8C0B4"}}>
                {allAssigned?`${maxNewDeals} co${maxNewDeals===1?"":"s"}`:"—"}
              </div>
              <div style={{fontSize:10,opacity:0.5}}>
                {allAssigned?`$${afterPipeline.toFixed(2)}M avail · at $${avgCheck}K avg`:`Assign all ${ASSIGNABLE.length} companies to see`}
              </div>
            </div>
          </div>
          {/* Future Commits + Timeline */}
          <div style={{background:"white",borderRadius:12,border:`2px solid ${NAVY}`,overflow:"hidden",marginBottom:14}}>
            <div onClick={()=>setShowSim(s=>!s)}
              style={{background:NAVY,padding:"12px 20px",display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer"}}>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <span style={{fontSize:13,color:"white",fontWeight:600,letterSpacing:"0.04em"}}>FUTURE COMMITS + DEPLOYMENT TIMELINE</span>
                <span style={{fontSize:10,color:"rgba(255,245,230,0.45)",fontFamily:"Arial,sans-serif"}}>Model named deals — see capital impact and timeline</span>
              </div>
              <span style={{fontSize:14,color:"rgba(255,245,230,0.6)",display:"inline-block",transform:showSim?"rotate(180deg)":"none"}}>▼</span>
            </div>
            {showSim && (
              <div style={{padding:"20px"}}>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:20}}>
                  {/* LEFT: Future commits entry */}
                  <div style={card("#FAFAF8")}>
                    <div style={{fontSize:9,letterSpacing:"0.1em",opacity:0.4,fontFamily:"Arial,sans-serif",marginBottom:12}}>FUTURE COMMITS — NEW CHECKS BEING CONSIDERED</div>
                    <div style={{background:"#FFF8E1",border:"1px solid #F0D080",borderRadius:8,padding:"8px 12px",marginBottom:14,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                      <div style={{display:"flex",alignItems:"center",gap:8}}>
                        <span>🔒</span>
                        <div>
                          <div style={{fontSize:12,fontWeight:600,color:"#856404"}}>SlapSnacks — $200K</div>
                          <div style={{fontSize:10,color:"#856404",fontFamily:"Arial,sans-serif",opacity:0.7}}>Already deducted from ${(FAMILY_DP_PRE/1e6).toFixed(2)}M base · shown for reference only</div>
                        </div>
                      </div>
                      <span style={{fontSize:11,color:"#856404",fontFamily:"Arial,sans-serif",fontStyle:"italic"}}>baked in ✓</span>
                    </div>
                    <div style={{display:"flex",gap:8,marginBottom:14,alignItems:"flex-end"}}>
                      <div style={{flex:2}}>
                        <div style={{fontSize:9,opacity:0.4,fontFamily:"Arial,sans-serif",marginBottom:4}}>COMPANY NAME</div>
                        <input value={newName} onChange={e=>setNewName(e.target.value)}
                          onKeyDown={e=>{if(e.key==="Enter")addDeal();}}
                          placeholder="e.g. Acme AI"
                          style={{width:"100%",padding:"8px 10px",border:`1px solid ${CREAM_DARK}`,borderRadius:6,fontSize:13,fontFamily:"Georgia,serif",color:NAVY,background:"white",boxSizing:"border-box",outline:"none"}}/>
                      </div>
                      <div style={{flex:1}}>
                        <div style={{fontSize:9,opacity:0.4,fontFamily:"Arial,sans-serif",marginBottom:4}}>CHECK ($K)</div>
                        <input type="number" value={newCheckK} min={50} max={2000} step={50}
                          onChange={e=>setNewCheckK(Number(e.target.value))}
                          style={{width:"100%",padding:"8px 10px",border:`1px solid ${CREAM_DARK}`,borderRadius:6,fontSize:13,fontFamily:"Georgia,serif",color:NAVY,background:"white",boxSizing:"border-box",outline:"none",textAlign:"right"}}/>
                      </div>
                      <button onClick={addDeal}
                        style={{background:NAVY,color:"white",border:"none",borderRadius:6,padding:"8px 16px",fontSize:12,fontFamily:"Arial,sans-serif",cursor:"pointer",fontWeight:600,whiteSpace:"nowrap"}}>
                        + Add
                      </button>
                    </div>
                    {pipeline.length===0 ? (
                      <div style={{textAlign:"center",padding:"16px 0",opacity:0.3,fontSize:12,fontStyle:"italic"}}>No deals added yet</div>
                    ) : (
                      <div>
                        {pipeline.map((d,i)=>(
                          <div key={d.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 0",borderBottom:`1px solid ${CREAM_DARK}`}}>
                            <div style={{display:"flex",alignItems:"center",gap:10}}>
                              <span style={{fontSize:10,opacity:0.35,fontFamily:"Arial,sans-serif",width:16}}>{i+1}</span>
                              <span style={{fontSize:13}}>{d.name}</span>
                            </div>
                            <div style={{display:"flex",alignItems:"center",gap:10}}>
                              <span style={{fontSize:13,fontWeight:600}}>${d.checkK}K</span>
                              <button onClick={()=>setPipeline(p=>p.filter(x=>x.id!==d.id))}
                                style={{background:"none",border:"none",cursor:"pointer",fontSize:13,opacity:0.3,color:NAVY,padding:"0 2px"}}>✕</button>
                            </div>
                          </div>
                        ))}
                        <div style={{display:"flex",justifyContent:"space-between",padding:"10px 0 4px",fontSize:13,fontWeight:700}}>
                          <span>{pipeline.length} deal{pipeline.length!==1?"s":""}</span>
                          <span style={{color:pipelineM>afterFO?"#DC3545":NAVY}}>${pipelineM.toFixed(2)}M</span>
                        </div>
                        <button onClick={()=>setPipeline([])}
                          style={{fontSize:10,fontFamily:"Arial,sans-serif",color:"#999",background:"none",border:"none",cursor:"pointer",padding:0,marginTop:2}}>Clear all</button>
                      </div>
                    )}
                  </div>
                  {/* RIGHT: Waterfall + Timeline */}
                  <div style={{display:"flex",flexDirection:"column",gap:14}}>
                    {/* Waterfall */}
                    <div style={card("#FAFAF8")}>
                      <div style={{fontSize:9,letterSpacing:"0.1em",opacity:0.4,fontFamily:"Arial,sans-serif",marginBottom:12}}>CAPITAL WATERFALL</div>
                      {[
                        {label:"Total usable DP (SlapSnacks baked in)",val:remaining,    color:NAVY},
                        foTotal>0&&{label:`Follow-on reserves (${t1cos+t2cos} cos)`,    val:-foTotal,     color:BLUE2,sub:true},
                        foTotal>0&&{label:"After follow-ons",                            val:afterFO,      color:NAVY,bold:true},
                        pipelineM>0&&{label:`${pipeline.length} future commit${pipeline.length!==1?"s":""}`,val:-pipelineM,color:PURPLE,sub:true},
                        {label:"Available for new deals",                                val:afterPipeline,color:afterPipeline<0.5?"#DC3545":afterPipeline<1.5?"#E67E22":GREEN,bold:true},
                      ].filter(Boolean).map(({label,val,color,sub,bold})=>(
                        <div key={label} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:`${sub?"3":"7"}px 0`,borderBottom:bold?`1px solid ${CREAM_DARK}`:"none",marginBottom:bold?4:0}}>
                          <span style={{fontSize:sub?10:11,opacity:sub?0.6:1,fontFamily:"Arial,sans-serif",paddingLeft:sub?12:0}}>
                            {sub&&"↳ "}{label}
                          </span>
                          <span style={{fontSize:bold?14:12,fontWeight:bold?700:500,color}}>
                            {val<0?`-$${Math.abs(val).toFixed(2)}M`:`$${val.toFixed(2)}M`}
                          </span>
                        </div>
                      ))}
                      <div style={{marginTop:10,fontSize:10,opacity:0.45,fontFamily:"Arial,sans-serif"}}>
                        At ${avgCheck}K avg → <strong>{maxNewDeals} new position{maxNewDeals!==1?"":""}</strong> remaining
                      </div>
                    </div>
                    {/* Timeline */}
                    <div style={{...card(NAVY),color:"white"}}>
                      <div style={{fontSize:9,letterSpacing:"0.1em",opacity:0.5,fontFamily:"Arial,sans-serif",marginBottom:12}}>DEPLOYMENT TIMELINE</div>
                      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
                        <span style={{fontSize:11,opacity:0.6,fontFamily:"Arial,sans-serif"}}>Pace:</span>
                        <input type="number" value={dealPerMonth} min={0.25} max={4} step={0.25}
                          onChange={e=>setDealPerMonth(Math.max(0.25,Number(e.target.value)))}
                          style={{width:48,padding:"4px 6px",borderRadius:4,border:"1px solid rgba(255,255,255,0.2)",background:"rgba(255,255,255,0.1)",color:"white",fontSize:13,fontFamily:"Georgia,serif",textAlign:"center",outline:"none"}}/>
                        <span style={{fontSize:11,opacity:0.6,fontFamily:"Arial,sans-serif"}}>new deals / month</span>
                      </div>
                      <div style={{display:"flex",flexDirection:"column",gap:8}}>
                        {[
                          pipeline.length>0&&{label:"Future commits (named)",count:pipeline.length,months:(pipeline.length/dealPerMonth).toFixed(1)},
                          {label:`Additional @ $${avgCheck}K avg`,count:maxNewDeals,months:dealPerMonth>0?(maxNewDeals/dealPerMonth).toFixed(1):"—"},
                        ].filter(Boolean).map(({label,count,months})=>(
                          <div key={label} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0",borderBottom:"1px solid rgba(255,255,255,0.1)"}}>
                            <span style={{fontSize:11,opacity:0.7,fontFamily:"Arial,sans-serif"}}>{label}</span>
                            <div style={{textAlign:"right"}}>
                              <span style={{fontSize:13,fontWeight:600}}>{count} deal{count!==1?"s":""}</span>
                              <span style={{fontSize:10,opacity:0.5,fontFamily:"Arial,sans-serif",marginLeft:6}}>~{months} mo</span>
                            </div>
                          </div>
                        ))}
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",paddingTop:8}}>
                          <span style={{fontSize:12,fontFamily:"Arial,sans-serif",opacity:0.7}}>Estimated full deployment</span>
                          <div style={{textAlign:"right"}}>
                            <div style={{fontSize:18,fontWeight:700}}>{deployStr}</div>
                            <div style={{fontSize:10,opacity:0.5,fontFamily:"Arial,sans-serif"}}>~{monthsLeft} month{monthsLeft!==1?"s":""} from today</div>
                          </div>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
                {/* Capital bar */}
                <div>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:9,fontFamily:"Arial,sans-serif",opacity:0.45,marginBottom:5}}>
                    <span>$0</span>
                    <span>CAPITAL ALLOCATION — ${remaining.toFixed(2)}M usable DP</span>
                    <span>${remaining.toFixed(2)}M</span>
                  </div>
                  <div style={{height:20,borderRadius:10,background:CREAM_DARK,overflow:"hidden",display:"flex"}}>
                    {foTotal>0&&<div style={{height:"100%",width:`${foW}%`,background:BLUE2,transition:"width 0.3s ease"}} title={`Follow-ons: $${foTotal.toFixed(2)}M`}/>}
                    {pipelineM>0&&<div style={{height:"100%",width:`${pipW}%`,background:PURPLE,transition:"width 0.3s ease"}} title={`Pipeline: $${pipelineM.toFixed(2)}M`}/>}
                    <div style={{height:"100%",flex:1,background:overBudget?"#FFCDD2":afterPipeline<1?"#FFE082":GREEN_BG}}/>
                  </div>
                  <div style={{display:"flex",gap:16,marginTop:8,fontSize:10,fontFamily:"Arial,sans-serif",opacity:0.6}}>
                    <span style={{display:"flex",alignItems:"center",gap:4}}><span style={{width:10,height:10,background:BLUE2,borderRadius:2,display:"inline-block"}}/> Follow-ons (${foTotal.toFixed(2)}M)</span>
                    {pipelineM>0&&<span style={{display:"flex",alignItems:"center",gap:4}}><span style={{width:10,height:10,background:PURPLE,borderRadius:2,display:"inline-block"}}/> Future commits (${pipelineM.toFixed(2)}M)</span>}
                    <span style={{display:"flex",alignItems:"center",gap:4}}><span style={{width:10,height:10,background:overBudget?"#FFCDD2":GREEN_BG,borderRadius:2,display:"inline-block"}}/> Remaining (${afterPipeline.toFixed(2)}M)</span>
                  </div>
                </div>
              </div>
            )}
          </div>
          {/* Tier breakdown */}
          {assignedCount>0&&(
            <div style={{background:"white",borderRadius:10,border:`1px solid ${CREAM_DARK}`,padding:"12px 18px",marginBottom:14}}>
              <div style={{fontSize:9,letterSpacing:"0.1em",opacity:0.4,fontFamily:"Arial,sans-serif",marginBottom:10}}>CURRENT TIER BREAKDOWN</div>
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                {[1,2,3].map(t=>{
                  const cos=ASSIGNABLE.filter(c=>asgn[c.name].tier===t).map(c=>c.name);
                  if(cos.length===0) return null;
                  return (
                    <div key={t} style={{display:"flex",alignItems:"center",gap:8,background:TIER_COLORS[t],borderRadius:8,padding:"6px 12px"}}>
                      <span style={{fontSize:10,color:"white",opacity:0.7,fontFamily:"Arial,sans-serif"}}>{TIER_LABELS[t].split("—")[0].trim()}:</span>
                      <span style={{fontSize:11,color:"white",fontWeight:600}}>{cos.join(" · ")}</span>
                    </div>
                  );
                })}
                {ASSIGNABLE.filter(c=>asgn[c.name].tier===null).length>0&&(
                  <div style={{display:"flex",alignItems:"center",gap:6,background:CREAM_DARK,borderRadius:8,padding:"6px 12px"}}>
                    <span style={{fontSize:10,color:NAVY,opacity:0.6,fontFamily:"Arial,sans-serif"}}>Unassigned:</span>
                    <span style={{fontSize:11,color:NAVY,fontWeight:600}}>{ASSIGNABLE.filter(c=>asgn[c.name].tier===null).map(c=>c.name).join(" · ")}</span>
                  </div>
                )}
              </div>
            </div>
          )}
          <p style={{textAlign:"center",fontStyle:"italic",color:NAVY,opacity:0.3,fontSize:11}}>
            Usable DP ${FAMILY_DP.toLocaleString()} · SlapSnacks $200K already deducted in base · Emanate $500K reflected in Airtable cost basis · Fees from Aduro · LP+GP callable at 55% · Affiliates III co-invest at {(AFF_III_RATIO*100).toFixed(4)}% · Last synced {LAST_SYNCED}
          </p>
        </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
